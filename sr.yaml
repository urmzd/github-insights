branches: [main]
tag_prefix: "v"
floating_tags: true

types:
  - name: feat
    bump: minor
    section: Features
  - name: fix
    bump: patch
    section: Bug Fixes
  - name: perf
    bump: patch
    section: Performance
  - name: docs
    section: Documentation
  - name: refactor
    bump: patch
    section: Refactoring
  - name: revert
    section: Reverts
  - name: chore
  - name: ci
  - name: test
  - name: build
  - name: style

version_files:
  - package.json

changelog:
  file: CHANGELOG.md

artifacts:
  - dist.tar.gz

hooks:
  commit-msg:
    - sr hook commit-msg
  pre-commit:
    - step: format
      patterns:
        - "*.ts"
        - "*.tsx"
      rules:
        - "npm run fmt:fix"
    - step: lint
      patterns:
        - "*.ts"
        - "*.tsx"
      rules:
        - "npm run lint"
    - step: typecheck
      patterns:
        - "*.ts"
        - "*.tsx"
      rules:
        - "npm run typecheck"
    - step: test
      patterns:
        - "*.ts"
        - "*.tsx"
      rules:
        - "npm run test"
