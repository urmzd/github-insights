branches:
  - main

floating_tags: true

version_files:
  - package.json

changelog:
  file: CHANGELOG.md

commit_types:
  chore: patch

artifacts:
  - dist.tar.gz

hooks:
  commit-msg:
    - sr hook commit-msg
  pre-commit:
    - npm run fmt
    - npm run lint
    - npm run typecheck
    - npm run test
