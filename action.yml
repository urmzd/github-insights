name: "GitHub Insights - Profile Enhancer"
description: "Generate SVG insights visualizations for your GitHub profile README"
author: "urmzd"
branding:
  icon: "bar-chart-2"
  color: "blue"

inputs:
  github-token:
    description: "GitHub token (needs repo read + models:read for AI project classification and preamble generation)"
    default: ${{ github.token }}
  username:
    description: "GitHub username to generate metrics for"
    default: ${{ github.repository_owner }}
  output-dir:
    description: "Directory to write SVG files to"
    default: "assets/insights"
  commit-push:
    description: "Whether to commit and push generated files"
    default: "true"
  commit-message:
    description: "Commit message when committing generated files"
    default: "chore: update metrics"
  commit-name:
    description: "Git user name for commits"
    default: "github-actions[bot]"
  commit-email:
    description: "Git user email for commits"
    default: "41898282+github-actions[bot]@users.noreply.github.com"
  config-file:
    description: "Path to github-insights.yml config file (also accepts .yaml)"
    default: "github-insights.yml"
  readme-path:
    description: "Output path for the generated profile README (set to 'none' to skip)"
    default: "README.md"
  template:
    description: "Section preset (classic, modern, minimal, ecosystem, showcase). Ignored if 'sections' is specified."
    default: "showcase"
  sections:
    description: "Comma-separated ordered list of sections: spotlight, velocity, rhythm, constellation, impact, portfolio. Overrides 'template' preset."
    default: ""
  fail-fast:
    description: "Exit with an error instead of falling back to heuristics when AI is unavailable"
    default: "false"
  export-json:
    description: "Export underlying JSON data alongside SVGs for auditing"
    default: "false"
runs:
  using: "node24"
  main: "dist/index.js"
